<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Man | CANNATEK Premium</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root { --accent: #00ff41; }
        body { background-color: #000; color: #fff; margin: 0; font-family: 'SF Pro Display', sans-serif; overflow-x: hidden; }
        
        .product-page { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; align-items: center; padding: 40px 8%; gap: 50px; }
        .image-section img { width: 80%; max-width: 550px; filter: drop-shadow(0 0 25px rgba(0, 255, 65, 0.4)); animation: float 5s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .info-section { z-index: 2; padding-left: 60px; }
        .back-link { color: var(--accent); text-decoration: none; letter-spacing: 2px; display: inline-block; margin-bottom: 30px; text-transform: uppercase; font-size: 13px; }
        
        /* FUENTES GRANDES */
        h1 { font-size: 5.5rem; margin: 10px 0; letter-spacing: -4px; line-height: 0.85; text-transform: uppercase; font-weight: 900; }
        .price { font-size: 3rem; font-weight: 700; margin: 25px 0; }
        .description { color: #86868b; font-size: 20px; line-height: 1.5; margin-bottom: 35px; max-width: 500px; }
        
        select.sabor-select-large { width: 100%; max-width: 420px; background: #111; border: 1px solid #333; color: #fff; padding: 20px; border-radius: 14px; margin-bottom: 40px; font-size: 18px; outline: none; }
        .btn-compra { background: var(--accent); color: #000; border: none; padding: 24px; font-size: 1.3rem; font-weight: 900; border-radius: 16px; cursor: pointer; width: 100%; max-width: 420px; text-transform: uppercase; transition: 0.3s; }

        /* SIDEBAR SUPERIOR */
        .cart-sidebar { position: fixed; right: -450px; top: 0; width: 400px; height: 100%; background: rgba(15, 15, 15, 0.98); backdrop-filter: blur(10px); z-index: 3000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: -20px 0 50px rgba(0,0,0,0.9); display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-header { padding: 30px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .close-cart { background: none; border: none; color: #fff; font-size: 40px; cursor: pointer; }
        .cart-items-body { flex: 1; overflow-y: auto; padding: 25px; }
        .cart-footer { padding: 30px; border-top: 1px solid #222; background: #000; }
        
        .qty-selector { display: flex; align-items: center; gap: 12px; background: #222; border-radius: 8px; padding: 6px 12px; width: fit-content; margin-top: 10px; }
        .qty-btn { background: none; border: none; color: var(--accent); font-size: 20px; font-weight: bold; cursor: pointer; }
        
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 2500; }
        .cart-overlay.show { display: block; }
        .btn-checkout { width: 100%; background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        @media (max-width: 900px) { 
            .product-page { grid-template-columns: 1fr; text-align: center; padding: 60px 5%; } 
            .info-section { padding-left: 0; }
            h1 { font-size: 3.5rem; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <div class="product-page">
        <div class="image-section">
            <img src="assets/pak.png" alt="Pack Man">
        </div>

        <div class="info-section">
            <a href="index.html" class="back-link">← Catálogo</a>
            <h1>Pack<br>Man</h1>
            <p style="color: #86868b; font-size: 1.5rem;">Live Resin + Liquid Diamonds • 2G</p>
            <p class="price">$72.000</p>
            <p class="description">
                La combinación perfecta de potencia y sabor. Pack Man utiliza una mezcla exclusiva de resina viva y diamantes líquidos para asegurar una experiencia premium de principio a fin.
            </p>

            <select class="sabor-select-large" id="sabor-packman">
                <option value="Mojito (Indica)">Mojito (Indica)</option>
                <option value="Strawberry Frosty (Híbrida)">Strawberry Frosty (Híbrida)</option>
                <option value="Miami Yayo (Sativa)">Miami Yayo (Sativa)</option>
                <option value="Berry (Sativa)">Berry (Sativa)</option>
                <option value="Cactus Coolerz (Híbrida)">Cactus Coolerz (Híbrida)</option>
            </select>

            <button class="btn-compra" onclick="comprarPackman()">Añadir al carrito</button>
        </div>
    </div>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header"><h2>Tu Bolsa</h2><button onclick="toggleCart()" class="close-cart">&times;</button></div>
        <div id="cart-items-container" class="cart-items-body"></div>
        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: bold; font-size: 1.3rem;">
                <span>Total:</span><span id="cart-total-sidebar">$0</span>
            </div>
            <button class="btn-checkout" onclick="window.location.href='checkout.html'">Finalizar Pedido</button>
        </div>
    </div>
    <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>

    <script src="js/flavor-dropdown.js"></script>
    <script>
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('show');
            actualizarVistaCarrito();
        }

        function actualizarVistaCarrito() {
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('cart-total-sidebar');
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            container.innerHTML = '';
            let total = 0;

            if (carrito.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#555; margin-top:50px;">Tu bolsa está vacía</p>';
            }

            carrito.forEach((item, index) => {
                total += item.precio * item.cantidad;
                container.innerHTML += `
                    <div style="display: flex; gap: 15px; margin-bottom: 25px; align-items: center; border-bottom: 1px solid #222; padding-bottom: 15px;">
                        <img src="${item.img}" width="60" style="border-radius: 8px;">
                        <div style="flex: 1;">
                            <div style="font-weight: bold; font-size: 14px; text-transform: uppercase;">${item.marca}</div>
                            <div style="color: #86868b; font-size: 12px; margin-top: 4px;">${item.sabor}</div>
                            <div class="qty-selector">
                                <button class="qty-btn" onclick="cambiarCantidad(${index}, -1)">-</button>
                                <span class="qty-num">${item.cantidad}</span>
                                <button class="qty-btn" onclick="cambiarCantidad(${index}, 1)">+</button>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="color: var(--accent); font-weight: bold;">$${(item.precio * item.cantidad).toLocaleString()}</div>
                            <button onclick="eliminarDelCarrito(${index})" style="background:none; border:none; color:#ff4444; cursor:pointer; font-size:13px; margin-top:10px;">Eliminar</button>
                        </div>
                    </div>`;
            });
            totalEl.innerText = `$${total.toLocaleString()}`;
        }

        function cambiarCantidad(index, delta) {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            carrito[index].cantidad += delta;
            if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(carrito));
            actualizarVistaCarrito();
        }

        function eliminarDelCarrito(index) {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            carrito.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(carrito));
            actualizarVistaCarrito();
        }

        function comprarPackman() {
            const sabor = document.getElementById('sabor-packman').value;
            let carritoActual = JSON.parse(localStorage.getItem('cart')) || [];
            const itemASumar = { id: 3, marca: "Pack Man", precio: 72000, sabor: sabor, cantidad: 1, img: "assets/pak.png" };
            const existe = carritoActual.find(item => item.id === itemASumar.id && item.sabor === sabor);
            if (existe) { existe.cantidad++; } else { carritoActual.push(itemASumar); }
            localStorage.setItem('cart', JSON.stringify(carritoActual));
            toggleCart(); 
        }
    </script>
</body>
</html>
